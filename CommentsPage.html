<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Post — Community</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #212121;
      --surface-2: #303030;
      --border: #3f3f3f;
      --text: #f1f1f1;
      --muted: #aaa;
      --accent: #3ea6ff;
      --banner-h: 56px;
      --exit-banner-h: 0px;
    }
    html.has-app-exit-banner { --exit-banner-h: 52px; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding-top: calc(var(--banner-h) + var(--exit-banner-h));
      font-family: Roboto, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
    }
    .hidden { display: none !important; }

    .app-exit-banner {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10001;
      align-items: center;
      justify-content: center;
      padding: 0.55rem 0.75rem;
      text-align: center;
      background: #1a2a3a;
      border-bottom: 2px solid #3ea6ff;
      box-shadow: 0 2px 14px rgba(0, 0, 0, 0.45);
    }
    .app-exit-banner.is-visible { display: flex; }
    .app-exit-banner--hint {
      background: linear-gradient(90deg, #1e2f1e, #1a2a3a);
      border-bottom-color: #8bc34a;
    }
    .app-exit-banner--urgent {
      background: linear-gradient(90deg, #3d1a1a, #2a1a2a);
      border-bottom-color: #ff6b6b;
      animation: exitPulseCm 1.6s ease-in-out infinite;
    }
    @keyframes exitPulseCm {
      0%, 100% { box-shadow: 0 2px 14px rgba(255, 107, 107, 0.25); }
      50% { box-shadow: 0 4px 22px rgba(255, 107, 107, 0.5); }
    }
    .app-exit-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      max-width: 100%;
      padding: 0.55rem 1rem;
      font-size: 0.92rem;
      font-weight: 700;
      color: #0f0f0f;
      text-decoration: none;
      background: #3ea6ff;
      border: 2px solid #6ec5ff;
      border-radius: 999px;
      box-shadow: 0 2px 8px rgba(62, 166, 255, 0.35);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .app-exit-banner--urgent .app-exit-btn {
      background: #ffb74d;
      border-color: #ff9800;
      color: #3e2723;
    }
    .app-exit-btn:active { transform: scale(0.98); }

    .countdown-banner {
      position: fixed; top: var(--exit-banner-h); left: 0; right: 0; z-index: 1000;
      height: var(--banner-h);
      display: flex; align-items: center; justify-content: center; gap: 1rem;
      background: #1a3a5c;
      border-bottom: 1px solid var(--border);
      font-variant-numeric: tabular-nums;
    }
    .countdown-banner.closed { background: #4a4a4a; }
    .countdown-banner .label { font-size: .7rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
    .countdown-units { display: flex; gap: .65rem; font-weight: 700; }
    .countdown-units span { display: inline-flex; flex-direction: column; align-items: center; min-width: 2.5rem; }
    .countdown-units em { font-style: normal; font-size: .65rem; font-weight: 500; color: var(--muted); }
    .countdown-banner.closed .countdown-units { display: none; }
    .countdown-banner .closed-msg { display: none; font-weight: 700; letter-spacing: .06em; }
    .countdown-banner.closed .closed-msg { display: block; }

    .wrap { max-width: 900px; margin: 0 auto; padding: 1rem 1rem 3rem; }
    .page-title { font-size: 1.35rem; font-weight: 500; margin: 0 0 1rem; }

    .content-block { margin-bottom: 1.5rem; }
    .content-block .subject { font-size: 1.15rem; font-weight: 600; margin-bottom: .75rem; }
    .content-body {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.15rem;
    }
    .content-body img { max-width: 100%; height: auto; }
    .attachments { margin-top: 1rem; padding-top: .85rem; border-top: 1px solid var(--border); }
    .attachments ul { list-style: none; margin: .4rem 0 0; padding: 0; }
    .attachments a { color: var(--accent); text-decoration: none; }
    .attachments a:hover { text-decoration: underline; }

    #join-comments {
      display: block;
      height: 0;
      scroll-margin-top: calc(var(--banner-h) + var(--exit-banner-h) + 12px);
    }
    #comments-section { scroll-margin-top: calc(var(--banner-h) + var(--exit-banner-h) + 12px); }

    .composer {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1.5rem;
    }
    .composer.locked { opacity: .45; pointer-events: none; }
    .composer label { display: block; font-size: .78rem; color: var(--muted); margin-bottom: .25rem; }
    .composer input, .composer textarea {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: .5rem .65rem;
      font: inherit;
      margin-bottom: .65rem;
    }
    .composer textarea { min-height: 88px; resize: vertical; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: .65rem; }
    @media (max-width: 560px) { .form-row { grid-template-columns: 1fr; } }
    .btn-primary {
      background: var(--accent);
      color: #0f0f0f;
      border: none;
      border-radius: 18px;
      padding: .5rem 1.1rem;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; }
    .status-msg { font-size: .8rem; min-height: 1rem; margin-top: .35rem; }
    .status-msg.ok { color: #6adb8a; }
    .status-msg.err { color: #ff6b6b; }

    .feed-title { font-size: 1rem; font-weight: 600; margin: 0 0 1rem; }
    .empty-feed { color: var(--muted); font-style: italic; }

    /* YouTube-style tree */
    .tree-node { margin-bottom: .85rem; }
    .tree-node .meta { font-size: .78rem; color: var(--muted); margin-bottom: .15rem; }
    .tree-node .meta strong { color: var(--text); font-size: .82rem; }
    .tree-node .text { font-size: .9rem; white-space: pre-wrap; word-break: break-word; }
    .tree-children { margin-left: 2rem; border-left: 2px solid var(--border); padding-left: .75rem; }
    .reply-btn {
      background: none; border: none; color: var(--muted);
      font-size: .78rem; font-weight: 600; cursor: pointer; padding: .3rem 0;
    }
    .reply-btn:hover { color: var(--text); }
    .reply-panel { display: none; margin-top: .5rem; }
    .reply-panel.open { display: block; }
    .reply-panel textarea {
      width: 100%; min-height: 72px;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); padding: .5rem; font: inherit;
    }

    /* 2-way texting bubbles */
    .chat-segment { margin: 1rem 0; }
    .chat-row { display: flex; margin-bottom: .5rem; }
    .chat-row.left { justify-content: flex-start; }
    .chat-row.right { justify-content: flex-end; }
    .bubble {
      max-width: 78%;
      padding: .55rem .75rem;
      border-radius: 14px;
      font-size: .88rem;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .chat-row.left .bubble { background: var(--surface-2); border-bottom-left-radius: 4px; }
    .chat-row.right .bubble { background: #264d73; border-bottom-right-radius: 4px; }
    .bubble-meta { font-size: .68rem; color: var(--muted); margin-bottom: .2rem; }

    .load-state, .fatal-error { text-align: center; padding: 3rem 1rem; }
    .fatal-error { color: #ff6b6b; }
  </style>
</head>
<body>
  <div id="appExitBanner" class="app-exit-banner" role="region" aria-label="Open in system browser" aria-hidden="true">
    <a id="appExitBtn" class="app-exit-btn" href="#" target="_blank" rel="noopener noreferrer">👉 Stuck in an App? Click here to Open in Chrome/Safari</a>
  </div>
  <header class="countdown-banner" id="countdownBanner">
    <span class="label">Discussion closes in</span>
    <div class="countdown-units" id="countdownUnits" aria-live="polite"></div>
    <span class="closed-msg">DISCUSSION CLOSED</span>
  </header>

  <div class="wrap">
    <div id="loadState" class="load-state">Loading post…</div>
    <div id="fatalError" class="fatal-error hidden"></div>

    <div id="portalMain" class="hidden">
      <h1 class="page-title" id="pageTitle">Post</h1>

      <section class="content-block">
        <div id="postSubject" class="subject"></div>
        <div class="content-body">
          <div id="postBody"></div>
          <div id="attachmentsBlock" class="attachments hidden">
            <strong>Downloads</strong>
            <ul id="attachmentsList"></ul>
          </div>
        </div>
      </section>

      <span id="join-comments"></span>
      <section id="comments-section">
        <div class="composer" id="composer">
          <div class="form-row">
            <div>
              <label for="inputFname">First name</label>
              <input id="inputFname" type="text" autocomplete="given-name">
            </div>
            <div>
              <label for="inputLname">Last name</label>
              <input id="inputLname" type="text" autocomplete="family-name">
            </div>
          </div>
          <label for="inputEmail">Email</label>
          <input id="inputEmail" type="email" autocomplete="email">
          <label for="mainCommentText">Your comment</label>
          <textarea id="mainCommentText" placeholder="Share your thoughts…"></textarea>
          <button type="button" class="btn-primary" id="mainSubmitBtn">Comment</button>
          <div id="mainStatus" class="status-msg" aria-live="polite"></div>
        </div>

        <h2 class="feed-title">Comments</h2>
        <div id="commentFeed"></div>
      </section>
    </div>
  </div>

  <script>
    (function () {
      var API_URL = 'https://script.google.com/macros/s/AKfycbxa3oj2BTcEQladm9llk7yyMYU2vcy7GzQ_dqbnPVGAUiSY9Imf_VZqjIJAHSDD-Q_wbw/exec';

      var params = new URLSearchParams(window.location.search);
      var postId = (params.get('post') || params.get('camp') || '').trim();
      var state = {
        postId: postId,
        comments: [],
        expired: false,
        locked: false,
        deadlineIso: (params.get('deadline') || '').trim(),
        postData: null,
        urlBaseline: { email: '', fname: '', lname: '' }
      };

      function looksLikeInAppBrowser() {
        var ua = navigator.userAgent || '';
        if (/YMail|YahooMail|YahooMobileMail|Yahoo\/.*Mail|yahoomail/i.test(ua)) return true;
        if (/FBAN|FBAV|Instagram|Snapchat|Line\/|\bFB_IAB\b/i.test(ua)) return true;
        if (/; wv\)|\bwv\)/i.test(ua)) return true;
        if (/YJApp-IOS|YJApp-Android/i.test(ua)) return true;
        return false;
      }

      function syncAppExitHref() {
        var link = document.getElementById('appExitBtn');
        if (link) link.href = window.location.href;
      }

      function showAppExitBanner(mode) {
        var wrap = document.getElementById('appExitBanner');
        if (!wrap) return;
        wrap.classList.remove('app-exit-banner--hint', 'app-exit-banner--urgent');
        wrap.classList.add('is-visible');
        if (mode === 'urgent') wrap.classList.add('app-exit-banner--urgent');
        else if (mode === 'hint') wrap.classList.add('app-exit-banner--hint');
        document.documentElement.classList.add('has-app-exit-banner');
        wrap.setAttribute('aria-hidden', 'false');
        syncAppExitHref();
      }

      function wireAppExitBanner() {
        var link = document.getElementById('appExitBtn');
        if (!link || link.getAttribute('data-wired') === '1') return;
        link.setAttribute('data-wired', '1');
        link.addEventListener('click', function (ev) {
          var url = window.location.href;
          ev.preventDefault();
          syncAppExitHref();
          var w = null;
          try {
            w = window.open(url, '_blank', 'noopener,noreferrer');
          } catch (e) {
            w = null;
          }
          if (w) {
            try {
              w.opener = null;
            } catch (e2) { /* ignore */ }
            return;
          }
          try {
            var a = document.createElement('a');
            a.href = url;
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
            a.style.display = 'none';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
          } catch (e3) {
            try {
              window.top.location.href = url;
            } catch (e4) {
              window.location.href = url;
            }
          }
        });
      }

      function esc(s) {
        var d = document.createElement('div');
        d.textContent = s == null ? '' : String(s);
        return d.innerHTML;
      }

      function callApi(params) {
        var rid = 'rid_' + Date.now() + '_' + Math.random().toString(36).slice(2);

        function trustedOrigin(origin) {
          try {
            var h = new URL(origin || '').hostname.toLowerCase();
            return h === 'script.google.com' || h.indexOf('googleusercontent.com') !== -1;
          } catch (e) {
            return false;
          }
        }

        function tryJsonp() {
          return new Promise(function (resolve, reject) {
            var cb = 'bpe_' + Date.now() + '_' + Math.random().toString(36).slice(2);
            var url = new URL(API_URL);
            url.searchParams.set('api', 'json');
            Object.keys(params).forEach(function (k) {
              if (params[k] != null && params[k] !== '') {
                url.searchParams.set(k, String(params[k]));
              }
            });
            url.searchParams.set('callback', cb);
            var timer = setTimeout(function () {
              cleanup();
              reject(new Error('JSONP timed out'));
            }, 25000);
            var script = document.createElement('script');
            function cleanup() {
              clearTimeout(timer);
              delete window[cb];
              if (script.parentNode) script.parentNode.removeChild(script);
            }
            window[cb] = function (data) {
              cleanup();
              resolve(data);
            };
            script.onerror = function () {
              cleanup();
              reject(new Error('JSONP blocked'));
            };
            script.src = url.toString();
            document.head.appendChild(script);
          });
        }

        function tryIframeEmbed() {
          return new Promise(function (resolve, reject) {
            var url = new URL(API_URL);
            url.searchParams.set('api', 'json');
            url.searchParams.set('embed', '1');
            url.searchParams.set('rid', rid);
            Object.keys(params).forEach(function (k) {
              if (params[k] != null && params[k] !== '') {
                url.searchParams.set(k, String(params[k]));
              }
            });
            var iframe = document.createElement('iframe');
            iframe.setAttribute('aria-hidden', 'true');
            iframe.style.cssText =
              'position:absolute;width:1px;height:1px;left:-99px;top:-99px;border:0;opacity:0;pointer-events:none';
            var timer = setTimeout(function () {
              cleanup();
              reject(new Error('Embed timed out'));
            }, 25000);
            function cleanup() {
              clearTimeout(timer);
              window.removeEventListener('message', onMsg);
              if (iframe.parentNode) iframe.parentNode.removeChild(iframe);
            }
            function onMsg(ev) {
              if (!trustedOrigin(ev.origin)) return;
              var d = ev.data;
              if (!d || d.source !== 'bpe_api' || d.rid !== rid) return;
              cleanup();
              resolve(d.payload);
            }
            window.addEventListener('message', onMsg);
            iframe.src = url.toString();
            document.body.appendChild(iframe);
          });
        }

        return tryJsonp().catch(function () {
          return tryIframeEmbed();
        });
      }

      function loadPostJson() {
        return fetch('posts/' + encodeURIComponent(postId) + '.json', { cache: 'no-store' })
          .then(function (r) {
            if (!r.ok) throw new Error('no-json');
            return r.json();
          });
      }

      function showFatal(msg) {
        document.getElementById('loadState').classList.add('hidden');
        document.getElementById('fatalError').classList.remove('hidden');
        document.getElementById('fatalError').textContent = msg;
        if (/timed out|embed|jsonp|blocked|could not load|failed to fetch|no-json/i.test(msg || '')) {
          showAppExitBanner('urgent');
        } else if (looksLikeInAppBrowser()) {
          showAppExitBanner('hint');
        }
      }

      function initIdentityFields() {
        var email = (params.get('email') || '').trim();
        var fname = (params.get('fname') || '').trim();
        var lname = (params.get('lname') || '').trim();
        state.urlBaseline = { email: email, fname: fname, lname: lname };
        document.getElementById('inputEmail').value = email;
        document.getElementById('inputFname').value = fname;
        document.getElementById('inputLname').value = lname;

        ['inputEmail', 'inputFname', 'inputLname'].forEach(function (id) {
          document.getElementById(id).addEventListener('input', onIdentityEdited);
        });
      }

      function onIdentityEdited() {
        var cur = {
          email: document.getElementById('inputEmail').value.trim(),
          fname: document.getElementById('inputFname').value.trim(),
          lname: document.getElementById('inputLname').value.trim()
        };
        var b = state.urlBaseline;
        if (cur.email !== b.email || cur.fname !== b.fname || cur.lname !== b.lname) {
          stripTrackingParams();
        }
      }

      function stripTrackingParams() {
        var p = new URLSearchParams(window.location.search);
        ['email', 'fname', 'lname', 'deadline'].forEach(function (k) { p.delete(k); });
        var qs = p.toString();
        var next = window.location.pathname + (qs ? '?' + qs : '') + window.location.hash;
        history.replaceState(null, '', next);
        state.urlBaseline = { email: '', fname: '', lname: '' };
      }

      function getDisplayName() {
        return [
          document.getElementById('inputFname').value.trim(),
          document.getElementById('inputLname').value.trim()
        ].filter(Boolean).join(' ').trim() || 'Guest';
      }

      function computeDeadline() {
        if (state.deadlineIso) return new Date(state.deadlineIso);
        var pd = state.postData;
        if (!pd || !pd.launchedAt || !pd.daysOpen) return null;
        var start = new Date(pd.launchedAt);
        if (isNaN(start.getTime())) return null;
        return new Date(start.getTime() + parseFloat(pd.daysOpen) * 86400000);
      }

      function pad2(n) { return n < 10 ? '0' + n : String(n); }

      function renderCountdown() {
        var units = document.getElementById('countdownUnits');
        var banner = document.getElementById('countdownBanner');
        var expiry = computeDeadline();
        if (!expiry) {
          units.innerHTML = '<span>∞<em>open</em></span>';
          return;
        }
        var rem = expiry.getTime() - Date.now();
        if (rem <= 0 || state.expired) {
          lockDiscussion();
          return;
        }
        banner.classList.remove('closed');
        var sec = Math.floor(rem / 1000);
        var d = Math.floor(sec / 86400);
        var h = Math.floor((sec % 86400) / 3600);
        var m = Math.floor((sec % 3600) / 60);
        var s = sec % 60;
        units.innerHTML =
          '<span>' + d + '<em>Days</em></span>' +
          '<span>' + pad2(h) + '<em>Hrs</em></span>' +
          '<span>' + pad2(m) + '<em>Min</em></span>' +
          '<span>' + pad2(s) + '<em>Sec</em></span>';
      }

      function lockDiscussion() {
        if (state.locked) return;
        state.locked = true;
        state.expired = true;
        document.getElementById('countdownBanner').classList.add('closed');
        document.getElementById('composer').classList.add('locked');
      }

      function renderPost(pd) {
        document.getElementById('pageTitle').textContent = 'Post ' + (pd.postId || postId);
        document.getElementById('postSubject').textContent = pd.subject || '';
        document.getElementById('postBody').innerHTML =
          pd.messageHtml || '<p><em>No message body.</em></p>';

        var block = document.getElementById('attachmentsBlock');
        var list = document.getElementById('attachmentsList');
        list.innerHTML = '';
        var files = pd.attachments || [];
        if (!files.length && pd.fileIdsRaw) {
          files = String(pd.fileIdsRaw).split(',').map(function (id) {
            id = id.trim();
            if (!id) return null;
            return {
              id: id,
              name: 'Download attachment',
              url: 'https://drive.google.com/uc?export=download&id=' + encodeURIComponent(id)
            };
          }).filter(Boolean);
        }
        if (files.length) {
          block.classList.remove('hidden');
          files.forEach(function (f) {
            var li = document.createElement('li');
            var a = document.createElement('a');
            a.href = f.url;
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
            a.textContent = f.name || ('Download ' + (f.id || 'file'));
            li.appendChild(a);
            list.appendChild(li);
          });
        } else {
          block.classList.add('hidden');
        }
      }

      function formatTime(iso) {
        if (!iso) return '';
        var d = new Date(iso);
        return isNaN(d.getTime()) ? String(iso) :
          d.toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' });
      }

      function buildTree(flat) {
        var map = {};
        var roots = [];
        flat.forEach(function (c) { map[c.id] = Object.assign({}, c, { children: [] }); });
        flat.forEach(function (c) {
          var n = map[c.id];
          if (c.parentId && map[c.parentId]) map[c.parentId].children.push(n);
          else roots.push(n);
        });
        return roots;
      }

      function collectSubtreeChrono(node) {
        var list = [{ id: node.id, parentId: node.parentId, displayName: node.displayName,
          text: node.text, timestamp: node.timestamp }];
        (node.children || []).forEach(function (ch) {
          list = list.concat(collectSubtreeChrono(ch));
        });
        list.sort(function (a, b) { return new Date(a.timestamp) - new Date(b.timestamp); });
        return list;
      }

      function splitLayoutSegments(chrono) {
        var segments = [];
        var current = { mode: 'chat', items: [] };

        function uniqueAuthors(items) {
          var names = [];
          items.forEach(function (it) {
            var n = it.displayName || 'Guest';
            if (names.indexOf(n) === -1) names.push(n);
          });
          return names;
        }

        function flush() {
          if (!current.items.length) return;
          segments.push({ mode: current.mode, items: current.items.slice() });
          current = { mode: 'chat', items: [] };
        }

        chrono.forEach(function (item) {
          if (current.mode === 'chat') {
            var next = current.items.concat([item]);
            if (uniqueAuthors(next).length > 2) {
              flush();
              current.mode = 'tree';
              current.items = [item];
            } else {
              current.items.push(item);
            }
          } else {
            current.items.push(item);
            if (uniqueAuthors(current.items).length <= 2) {
              flush();
              current.mode = 'chat';
              current.items = [item];
            }
          }
        });
        flush();
        return segments;
      }

      function renderChatSegment(seg, container, nodeMap) {
        var wrap = document.createElement('div');
        wrap.className = 'chat-segment';
        var sideMap = {};
        var flip = false;

        seg.items.forEach(function (item) {
          var name = item.displayName || 'Guest';
          if (!sideMap[name]) {
            sideMap[name] = flip ? 'right' : 'left';
            flip = !flip;
          }
          var row = document.createElement('div');
          row.className = 'chat-row ' + sideMap[name];
          row.innerHTML =
            '<div class="bubble">' +
            '<div class="bubble-meta">' + esc(name) + ' · ' + esc(formatTime(item.timestamp)) + '</div>' +
            esc(item.text) +
            '</div>';
          wrap.appendChild(row);
          attachReplyUi(item, wrap, nodeMap);
        });
        container.appendChild(wrap);
      }

      function renderTreeItems(items, container, nodeMap, depth) {
        depth = depth || 0;
        items.forEach(function (item) {
          var node = nodeMap[item.id];
          var el = document.createElement('div');
          el.className = 'tree-node';
          el.innerHTML =
            '<div class="meta"><strong>' + esc(item.displayName) + '</strong> · ' +
            esc(formatTime(item.timestamp)) + '</div>' +
            '<div class="text">' + esc(item.text) + '</div>';
          attachReplyUi(item, el, nodeMap);
          container.appendChild(el);
          if (node && node.children && node.children.length) {
            var kids = document.createElement('div');
            kids.className = 'tree-children';
            var childChrono = [];
            node.children.forEach(function (ch) {
              childChrono = childChrono.concat(collectSubtreeChrono(ch));
            });
            childChrono.sort(function (a, b) {
              return new Date(a.timestamp) - new Date(b.timestamp);
            });
            renderThreadBranch(childChrono, nodeMap, kids);
            if (kids.childNodes.length) el.appendChild(kids);
          }
        });
      }

      function renderThreadBranch(chrono, nodeMap, container) {
        var segments = splitLayoutSegments(chrono);
        segments.forEach(function (seg) {
          if (!seg.items.length) return;
          if (seg.mode === 'chat') renderChatSegment(seg, container, nodeMap);
          else renderTreeItems(seg.items, container, nodeMap, 0);
        });
      }

      function attachReplyUi(item, parentEl, nodeMap) {
        if (state.locked) return;
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'reply-btn';
        btn.textContent = 'Reply';
        var panel = document.createElement('div');
        panel.className = 'reply-panel';
        panel.innerHTML =
          '<textarea placeholder="Write a reply…"></textarea>' +
          '<button type="button" class="btn-primary reply-submit" style="margin-top:.4rem">Reply</button>' +
          '<div class="status-msg reply-status"></div>';

        btn.addEventListener('click', function () {
          document.querySelectorAll('.reply-panel.open').forEach(function (p) {
            if (p !== panel) p.classList.remove('open');
          });
          panel.classList.toggle('open');
          panel.querySelector('textarea').focus();
        });

        panel.querySelector('.reply-submit').addEventListener('click', function () {
          var txt = panel.querySelector('textarea').value.trim();
          if (!txt) return;
          submitComment(txt, item.id, panel.querySelector('.reply-status'), function () {
            panel.classList.remove('open');
            panel.querySelector('textarea').value = '';
          });
        });

        parentEl.appendChild(btn);
        parentEl.appendChild(panel);
      }

      function renderFeed(list) {
        var feed = document.getElementById('commentFeed');
        feed.innerHTML = '';
        if (!list || !list.length) {
          feed.innerHTML = '<p class="empty-feed">No comments yet. Be the first.</p>';
          return;
        }
        var roots = buildTree(list);
        var nodeMap = {};
        function indexNodes(nodes) {
          nodes.forEach(function (n) {
            nodeMap[n.id] = n;
            if (n.children && n.children.length) indexNodes(n.children);
          });
        }
        indexNodes(roots);
        roots.forEach(function (root) {
          var chrono = collectSubtreeChrono(root);
          var branch = document.createElement('div');
          branch.className = 'thread-branch';
          renderThreadBranch(chrono, nodeMap, branch);
          feed.appendChild(branch);
        });
      }

      function submitComment(text, parentId, statusEl, onOk) {
        if (state.locked) {
          statusEl.textContent = 'Discussion is closed.';
          statusEl.className = 'status-msg err';
          return;
        }
        var email = document.getElementById('inputEmail').value.trim();
        if (!email) {
          statusEl.textContent = 'Email is required.';
          statusEl.className = 'status-msg err';
          return;
        }
        statusEl.textContent = 'Posting…';
        statusEl.className = 'status-msg';

        callApi({
          cmd: 'comment',
          post: postId,
          camp: postId,
          comment: text,
          email: email,
          fname: document.getElementById('inputFname').value.trim(),
          lname: document.getElementById('inputLname').value.trim(),
          displayName: getDisplayName(),
          parentId: parentId || ''
        }).then(function (data) {
          if (data && data.ok) {
            statusEl.textContent = data.message || 'Posted.';
            statusEl.className = 'status-msg ok';
            state.comments = data.comments || state.comments;
            renderFeed(state.comments);
            if (onOk) onOk();
          } else {
            statusEl.textContent = (data && data.message) || 'Could not post.';
            statusEl.className = 'status-msg err';
          }
        }).catch(function (e) {
          statusEl.textContent = e.message || 'Could not post.';
          statusEl.className = 'status-msg err';
          if (/timed out|embed|jsonp|blocked/i.test(e.message || '')) {
            showAppExitBanner('urgent');
          } else if (looksLikeInAppBrowser()) {
            showAppExitBanner('hint');
          }
        });
      }

      function boot() {
        if (!postId) {
          showFatal('Missing post parameter in URL.');
          return;
        }

        initIdentityFields();

        Promise.all([
          loadPostJson().catch(function () { return null; }),
          callApi({ cmd: 'getComments', post: postId, camp: postId })
        ]).then(function (results) {
          var postJson = results[0];
          var commentResp = results[1];

          if (commentResp && commentResp.ok) {
            state.comments = commentResp.comments || [];
          }

          return callApi({ cmd: 'getPortal', post: postId, camp: postId }).then(function (portal) {
            if (portal && portal.ok) {
              if (portal.deadlineIso) state.deadlineIso = portal.deadlineIso;
              state.expired = !!portal.expired;
              state.comments = portal.comments || state.comments;
              if (!postJson) {
                postJson = {
                  postId: postId,
                  subject: portal.emailSubject,
                  messageHtml: portal.emailBodyHtml,
                  attachments: portal.attachments,
                  daysOpen: portal.daysOpen
                };
              }
            } else if (portal && portal.message) {
              throw new Error(portal.message);
            }
            return postJson;
          });
        }).then(function (postJson) {
          if (!postJson) {
            showFatal('Post content not found. Run Post Send & Sync from the spreadsheet.');
            return;
          }
          state.postData = postJson;
          document.getElementById('loadState').classList.add('hidden');
          document.getElementById('portalMain').classList.remove('hidden');
          renderPost(postJson);
          renderFeed(state.comments);
          renderCountdown();
          setInterval(renderCountdown, 1000);
          if (state.expired) lockDiscussion();

          document.getElementById('mainSubmitBtn').addEventListener('click', function () {
            var txt = document.getElementById('mainCommentText').value.trim();
            if (!txt) return;
            submitComment(txt, '', document.getElementById('mainStatus'), function () {
              document.getElementById('mainCommentText').value = '';
            });
          });

          if (window.location.hash === '#join-comments') {
            requestAnimationFrame(function () {
              document.getElementById('join-comments').scrollIntoView({ behavior: 'smooth' });
            });
          }
        }).catch(function (e) {
          showFatal(
            'Could not load post. ' + (e.message || '') +
            ' If you opened this from Yahoo Mail or another in-app browser, tap “Open in browser” (or Safari/Chrome) and try again.'
          );
        });
      }

      wireAppExitBanner();
      if (looksLikeInAppBrowser()) {
        showAppExitBanner('hint');
      }

      boot();
    })();
  </script>
</body>
</html>
