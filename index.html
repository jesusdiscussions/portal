<!DOCTYPE html>
<html lang="en">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Post</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --card: #ffffff;
      --text: #1a1a1a;
      --muted: #5f6368;
      --accent: #1a73e8;
      --success: #0d904f;
      --success-bg: #e6f4ea;
      --error: #c5221f;
      --error-bg: #fce8e6;
      --border: #e0e3e7;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem 1.75rem;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
    }

    .icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 1.25rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon.loading { background: #e8f0fe; }
    .icon.success { background: var(--success-bg); color: var(--success); font-size: 1.75rem; font-weight: 700; }
    .icon.error { background: var(--error-bg); color: var(--error); font-size: 1.75rem; font-weight: 700; }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #c6dafc;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .card h1 {
      font-size: 1.15rem;
      font-weight: 600;
      margin: 0 0 0.5rem;
    }

    .card p {
      margin: 0;
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .state { display: none; }
    .state.active { display: block; }

    a.inline-link { color: var(--accent); }
  </style>
</head>
<body>
  <main class="card">
    <section id="stateLoading" class="state active" aria-live="polite">
      <div class="icon loading" aria-hidden="true"><div class="spinner"></div></div>
      <h1>Processing your request…</h1>
      <p>Please wait a moment.</p>
    </section>
    <section id="stateSuccess" class="state" aria-live="polite">
      <div class="icon success" aria-hidden="true">✓</div>
      <h1 id="successTitle">Done</h1>
      <p id="successMessage"></p>
    </section>
    <section id="stateError" class="state" aria-live="polite">
      <div class="icon error" aria-hidden="true">!</div>
      <h1>Something went wrong</h1>
      <p id="errorMessage">We could not complete your request.</p>
    </section>
  </main>

  <script>
    (function () {
      /** Keep in sync with WEB_APP_URL_DEFAULT in Code.gs */
      var WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbxa3oj2BTcEQladm9llk7yyMYU2vcy7GzQ_dqbnPVGAUiSY9Imf_VZqjIJAHSDD-Q_wbw/exec';

      function isAppsScriptHost() {
        return typeof google !== 'undefined' && google.script && google.script.run;
      }

      /** Legacy GitHub Pages links → same web app (avoids cross-origin fetch / 401). */
      if (/\.github\.io$/i.test(window.location.hostname)) {
        var ghQs = new URLSearchParams(window.location.search);
        window.location.replace(WEBAPP_URL + '?' + ghQs.toString());
        return;
      }

      function resolvePostId(params) {
        var post = (params.get('post') || '').trim();
        if (post) return post;
        return (params.get('camp') || '').trim();
      }

      function withPostAndCamp(postId, data) {
        var body = Object.assign({}, data);
        if (postId) {
          body.post = postId;
          body.camp = postId;
        }
        return body;
      }

      function callBackend(method, data) {
        var body = withPostAndCamp(resolvePostId(new URLSearchParams(window.location.search)), data);
        if (isAppsScriptHost()) {
          return new Promise(function (resolve, reject) {
            google.script.run
              .withSuccessHandler(resolve)
              .withFailureHandler(function (err) {
                reject(new Error(err && err.message ? err.message : String(err)));
              })
              [method](body);
          });
        }
        var url = new URL(WEBAPP_URL);
        Object.keys(body).forEach(function (key) {
          if (body[key] !== undefined && body[key] !== null && body[key] !== '') {
            url.searchParams.set(key, String(body[key]));
          }
        });
        url.searchParams.set('api', 'json');
        return fetch(url.toString(), { method: 'GET', redirect: 'follow' })
          .then(function (res) {
            if (!res.ok) throw new Error('Server returned ' + res.status);
            return res.json();
          });
      }

      var params = new URLSearchParams(window.location.search);
      var rawAction = (params.get('action') || '').trim().toLowerCase();
      if (rawAction === 'unsubscribe') rawAction = 'unsub';
      if (rawAction === 'portal' || rawAction === 'comments') rawAction = 'comments';

      if (rawAction === 'comments') {
        var forward = new URLSearchParams();
        var postVal = resolvePostId(params);
        if (postVal) forward.set('post', postVal);
        ['email', 'fname', 'lname', 'deadline'].forEach(function (key) {
          var val = params.get(key);
          if (val) forward.set(key, val);
        });
        forward.set('page', 'comments');
        var execBase = window.location.href.split('?')[0];
        window.location.replace(execBase + '?' + forward.toString());
        return;
      }

      var postId = resolvePostId(params);
      var payload = {
        action: rawAction,
        post: postId,
        email: (params.get('email') || '').trim(),
        fname: (params.get('fname') || '').trim(),
        lname: (params.get('lname') || '').trim()
      };

      function escapeHtml(s) {
        var d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
      }

      function showState(name) {
        ['stateLoading', 'stateSuccess', 'stateError'].forEach(function (id) {
          document.getElementById(id).classList.toggle('active', id === name);
        });
      }

      function showSuccess(data) {
        var title = payload.action === 'confirm' ? 'Subscription confirmed' : 'Unsubscribed';
        var msg = data.message || (payload.action === 'confirm'
          ? 'Your subscription is confirmed. Thank you!'
          : 'You have successfully unsubscribed.');
        document.getElementById('successTitle').textContent = title;
        var el = document.getElementById('successMessage');
        if (data.resubscribeUrl) {
          el.innerHTML = escapeHtml(msg) + ' <a class="inline-link" href="' +
            data.resubscribeUrl.replace(/"/g, '&quot;') + '">Subscribe again</a>';
        } else {
          el.textContent = msg;
        }
        showState('stateSuccess');
      }

      function showError(msg) {
        document.getElementById('errorMessage').textContent = msg;
        showState('stateError');
      }

      if (!payload.action) {
        showError('Missing action parameter. Use confirm or unsub.');
        return;
      }
      if (!payload.post) {
        showError('Missing post (Post ID) parameter.');
        return;
      }
      if (!payload.email) {
        showError('Missing email parameter.');
        return;
      }
      if (payload.action !== 'confirm' && payload.action !== 'unsub') {
        showError('Unknown action. Use confirm or unsub.');
        return;
      }

      callBackend('apiExternalAction', payload)
        .then(function (data) {
          if (data && data.status === 'success') {
            showSuccess(data);
          } else {
            showError((data && data.message) || 'Request failed.');
          }
        })
        .catch(function (e) {
          showError('Could not reach the post service. ' + (e.message || ''));
        });
    })();
  </script>
</body>
</html>
