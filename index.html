<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Post — Subscription</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --card: #fff;
      --text: #1a1a1a;
      --muted: #5f6368;
      --accent: #1a73e8;
      --ok: #0d904f;
      --ok-bg: #e6f4ea;
      --err: #c5221f;
      --err-bg: #fce8e6;
      --border: #e0e3e7;
      --exit-banner-h: 0px;
    }
    html.has-app-exit-banner { --exit-banner-h: 52px; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem 1.75rem;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,.06);
    }
    .icon {
      width: 56px; height: 56px;
      margin: 0 auto 1.25rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon.load { background: #e8f0fe; }
    .icon.ok { background: var(--ok-bg); color: var(--ok); font-size: 1.75rem; font-weight: 700; }
    .icon.bad { background: var(--err-bg); color: var(--err); font-size: 1.75rem; font-weight: 700; }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid #c6dafc;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 1.15rem; margin: 0 0 .5rem; }
    p { margin: 0; color: var(--muted); line-height: 1.5; font-size: .95rem; }
    .state { display: none; }
    .state.on { display: block; }
    a { color: var(--accent); }

    body.has-app-exit-padding {
      padding-top: calc(1.5rem + var(--exit-banner-h));
    }

    .app-exit-banner {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10001;
      align-items: center;
      justify-content: center;
      padding: 0.55rem 0.75rem;
      text-align: center;
      background: #e8f0fe;
      border-bottom: 2px solid #c6dafc;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }
    .app-exit-banner.is-visible { display: flex; }
    .app-exit-banner--hint {
      background: linear-gradient(90deg, #fff8e1, #e3f2fd);
      border-bottom-color: #ffc107;
    }
    .app-exit-banner--urgent {
      background: linear-gradient(90deg, #fce8e6, #fff3e0);
      border-bottom-color: #ea4335;
      animation: exitPulse 1.6s ease-in-out infinite;
    }
    @keyframes exitPulse {
      0%, 100% { box-shadow: 0 2px 12px rgba(234, 67, 53, 0.25); }
      50% { box-shadow: 0 4px 20px rgba(234, 67, 53, 0.45); }
    }
    .app-exit-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      max-width: 100%;
      padding: 0.55rem 1rem;
      font-size: 0.92rem;
      font-weight: 700;
      color: #0d47a1;
      text-decoration: none;
      background: #fff;
      border: 2px solid #1a73e8;
      border-radius: 999px;
      box-shadow: 0 2px 6px rgba(26, 115, 232, 0.2);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .app-exit-banner--urgent .app-exit-btn {
      color: #b31412;
      border-color: #c5221f;
    }
    .app-exit-btn:active { transform: scale(0.98); }
  </style>
</head>
<body>
  <div id="appExitBanner" class="app-exit-banner" role="region" aria-label="Open in system browser" aria-hidden="true">
    <a id="appExitBtn" class="app-exit-btn" href="#" target="_blank" rel="noopener noreferrer">👉 Stuck in an App? Click here to Open in Chrome/Safari</a>
  </div>
  <main class="card">
    <section id="sLoad" class="state on" aria-live="polite">
      <div class="icon load" aria-hidden="true"><div class="spinner"></div></div>
      <h1>Processing…</h1>
      <p>Please wait.</p>
    </section>
    <section id="sOk" class="state" aria-live="polite">
      <div class="icon ok" aria-hidden="true">✓</div>
      <h1 id="okTitle">Done</h1>
      <p id="okMsg"></p>
    </section>
    <section id="sErr" class="state" aria-live="polite">
      <div class="icon bad" aria-hidden="true">!</div>
      <h1>Something went wrong</h1>
      <p id="errMsg">We could not complete your request.</p>
    </section>
  </main>
  <script>
    (function () {
      var API_URL = 'https://script.google.com/macros/s/AKfycbxa3oj2BTcEQladm9llk7yyMYU2vcy7GzQ_dqbnPVGAUiSY9Imf_VZqjIJAHSDD-Q_wbw/exec';

      function resolvePostId(p) {
        return (p.get('post') || p.get('camp') || '').trim();
      }

      function show(id) {
        ['sLoad', 'sOk', 'sErr'].forEach(function (sid) {
          document.getElementById(sid).classList.toggle('on', sid === id);
        });
      }

      function esc(s) {
        var d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
      }

      function looksLikeInAppBrowser() {
        var ua = navigator.userAgent || '';
        if (/YMail|YahooMail|YahooMobileMail|Yahoo\/.*Mail|yahoomail/i.test(ua)) return true;
        if (/FBAN|FBAV|Instagram|Snapchat|Line\/|\bFB_IAB\b/i.test(ua)) return true;
        if (/; wv\)|\bwv\)/i.test(ua)) return true;
        if (/YJApp-IOS|YJApp-Android/i.test(ua)) return true;
        return false;
      }

      function toHandoffB64(str) {
        var utf8 = unescape(encodeURIComponent(String(str)));
        var bin = '';
        for (var i = 0; i < utf8.length; i++) {
          bin += String.fromCharCode(utf8.charCodeAt(i));
        }
        return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
      }

      /** Shorter than full absolute URL — helps in-app mail clients that truncate long go.html?b= links. */
      function compactPageRefForHandoff() {
        var u = new URL(window.location.href);
        if ((u.pathname || '').indexOf('go.html') !== -1) return u.href;
        var path = u.pathname || '/';
        var slash = path.lastIndexOf('/');
        var file = slash >= 0 ? path.slice(slash + 1) : path;
        return file + (u.search || '') + (u.hash || '');
      }

      function mailHandoffUrlForCurrentPage() {
        if (window.location.href.indexOf('/go.html') !== -1) {
          return window.location.href;
        }
        var hop = new URL('go.html', window.location.href);
        hop.searchParams.set('b', toHandoffB64(compactPageRefForHandoff()));
        return hop.href;
      }

      function navigateToMailHandoff() {
        window.location.href = mailHandoffUrlForCurrentPage();
      }

      function syncAppExitHref() {
        var link = document.getElementById('appExitBtn');
        if (link) link.href = mailHandoffUrlForCurrentPage();
      }

      function showAppExitBanner(mode) {
        var wrap = document.getElementById('appExitBanner');
        if (!wrap) return;
        wrap.classList.remove('app-exit-banner--hint', 'app-exit-banner--urgent');
        wrap.classList.add('is-visible');
        if (mode === 'urgent') wrap.classList.add('app-exit-banner--urgent');
        else if (mode === 'hint') wrap.classList.add('app-exit-banner--hint');
        document.documentElement.classList.add('has-app-exit-banner');
        document.body.classList.add('has-app-exit-padding');
        wrap.setAttribute('aria-hidden', 'false');
        syncAppExitHref();
      }

      function wireAppExitBanner() {
        var link = document.getElementById('appExitBtn');
        if (!link || link.getAttribute('data-wired') === '1') return;
        link.setAttribute('data-wired', '1');
        link.addEventListener('click', function (ev) {
          ev.preventDefault();
          navigateToMailHandoff();
        });
      }

      wireAppExitBanner();
      if (looksLikeInAppBrowser()) {
        showAppExitBanner('hint');
      }

      function callApi(params) {
        var rid = 'rid_' + Date.now() + '_' + Math.random().toString(36).slice(2);

        function trustedOrigin(origin) {
          try {
            var h = new URL(origin || '').hostname.toLowerCase();
            return h === 'script.google.com' || h.indexOf('googleusercontent.com') !== -1;
          } catch (e) {
            return false;
          }
        }

        function tryJsonp() {
          return new Promise(function (resolve, reject) {
            var cb = 'bpe_' + Date.now() + '_' + Math.random().toString(36).slice(2);
            var url = new URL(API_URL);
            url.searchParams.set('api', 'json');
            Object.keys(params).forEach(function (k) {
              if (params[k] != null && params[k] !== '') {
                url.searchParams.set(k, String(params[k]));
              }
            });
            url.searchParams.set('callback', cb);
            var timer = setTimeout(function () {
              cleanup();
              reject(new Error('JSONP timed out'));
            }, 25000);
            var script = document.createElement('script');
            function cleanup() {
              clearTimeout(timer);
              delete window[cb];
              if (script.parentNode) script.parentNode.removeChild(script);
            }
            window[cb] = function (data) {
              cleanup();
              resolve(data);
            };
            script.onerror = function () {
              cleanup();
              reject(new Error('JSONP blocked'));
            };
            script.src = url.toString();
            document.head.appendChild(script);
          });
        }

        function tryIframeEmbed() {
          return new Promise(function (resolve, reject) {
            var url = new URL(API_URL);
            url.searchParams.set('api', 'json');
            url.searchParams.set('embed', '1');
            url.searchParams.set('rid', rid);
            Object.keys(params).forEach(function (k) {
              if (params[k] != null && params[k] !== '') {
                url.searchParams.set(k, String(params[k]));
              }
            });
            var iframe = document.createElement('iframe');
            iframe.setAttribute('aria-hidden', 'true');
            iframe.style.cssText =
              'position:absolute;width:1px;height:1px;left:-99px;top:-99px;border:0;opacity:0;pointer-events:none';
            var timer = setTimeout(function () {
              cleanup();
              reject(new Error('Embed timed out'));
            }, 25000);
            function cleanup() {
              clearTimeout(timer);
              window.removeEventListener('message', onMsg);
              if (iframe.parentNode) iframe.parentNode.removeChild(iframe);
            }
            function onMsg(ev) {
              if (!trustedOrigin(ev.origin)) return;
              var d = ev.data;
              if (!d || d.source !== 'bpe_api' || d.rid !== rid) return;
              cleanup();
              resolve(d.payload);
            }
            window.addEventListener('message', onMsg);
            iframe.src = url.toString();
            document.body.appendChild(iframe);
          });
        }

        return tryJsonp().catch(function () {
          return tryIframeEmbed();
        });
      }

      var params = new URLSearchParams(window.location.search);
      var action = (params.get('action') || '').trim().toLowerCase();
      if (action === 'unsubscribe') action = 'unsub';

      var payload = {
        cmd: action,
        post: resolvePostId(params),
        camp: resolvePostId(params),
        email: (params.get('email') || '').trim(),
        fname: (params.get('fname') || '').trim(),
        lname: (params.get('lname') || '').trim()
      };

      if (!payload.cmd || (payload.cmd !== 'confirm' && payload.cmd !== 'unsub')) {
        show('sErr');
        document.getElementById('errMsg').textContent = 'Missing or invalid action (confirm or unsub).';
        if (looksLikeInAppBrowser()) showAppExitBanner('hint');
        return;
      }
      if (!payload.post) {
        show('sErr');
        document.getElementById('errMsg').textContent = 'Missing post parameter.';
        if (looksLikeInAppBrowser()) showAppExitBanner('hint');
        return;
      }
      if (!payload.email) {
        show('sErr');
        document.getElementById('errMsg').textContent = 'Missing email parameter.';
        if (looksLikeInAppBrowser()) showAppExitBanner('hint');
        return;
      }

      callApi(payload).then(function (data) {
        if (data && data.ok) {
          document.getElementById('okTitle').textContent =
            payload.cmd === 'confirm' ? 'Subscription confirmed' : 'Unsubscribed';
          var el = document.getElementById('okMsg');
          if (data.resubscribeUrl) {
            el.innerHTML = esc(data.message || '') + ' <a href="' +
              data.resubscribeUrl.replace(/"/g, '&quot;') + '">Subscribe again</a>';
          } else {
            el.textContent = data.message || 'Done.';
          }
          show('sOk');
          return;
        }

        show('sErr');
        var errText = (data && data.message) || 'Request failed.';
        document.getElementById('errMsg').textContent = errText;
        if (/timed out|embed|jsonp|blocked|could not reach|reach the service/i.test(errText)) {
          showAppExitBanner('urgent');
        } else if (looksLikeInAppBrowser()) {
          showAppExitBanner('hint');
        }
      }).catch(function (e) {
        show('sErr');
        showAppExitBanner('urgent');
        document.getElementById('errMsg').textContent =
          'Could not reach the service. If you are inside Yahoo Mail or another in-app browser, open this page in Safari or Chrome, then try again. ' +
          (e.message || '');
      });
    })();
  </script>
</body>
</html>
